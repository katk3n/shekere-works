<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Shekere Preview</title>
  <style>
    :root { color-scheme: dark; font-family: ui-rounded, system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100dvh; overflow: hidden; background: #090713; color: #f5f2ff; }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; touch-action: none; }
    header, .controls { position: fixed; left: 16px; right: 16px; z-index: 1; }
    header { top: max(16px, env(safe-area-inset-top)); display: flex; justify-content: space-between; font-size: 12px; letter-spacing: .08em; text-transform: uppercase; opacity: .82; }
    .controls { bottom: max(16px, env(safe-area-inset-bottom)); padding: 14px; border: 1px solid #ffffff22; border-radius: 18px; background: #100c1dcc; backdrop-filter: blur(14px); }
    .row { display: grid; grid-template-columns: 72px 1fr; align-items: center; gap: 10px; margin: 9px 0; font-size: 13px; }
    button { border: 0; border-radius: 999px; padding: 9px 13px; background: #e7bbff; color: #1c0924; font: inherit; font-weight: 700; }
    input { accent-color: #e7bbff; width: 100%; }
  </style>
</head>
<body>
  <canvas aria-label="Animated visual preview"></canvas>
  <header><span>Preview</span><span>Approximate Shekere rendering</span></header>
  <section class="controls" aria-label="Preview controls">
    <button id="toggle" type="button">Pause</button>
    <label class="row">Energy <input id="energy" type="range" min="0" max="1" step=".01" value=".28"></label>
    <label class="row">Bass <input id="bass" type="range" min="0" max="1" step=".01" value=".22"></label>
    <label class="row">Sparkle <input id="sparkle" type="range" min="0" max="1" step=".01" value=".36"></label>
  </section>
  <script>
    const canvas = document.querySelector('canvas'), ctx = canvas.getContext('2d');
    const controls = ['energy', 'bass', 'sparkle'].reduce((all, id) => ({ ...all, [id]: document.getElementById(id) }), {});
    const toggle = document.getElementById('toggle'); let running = true;
    function resize() { canvas.width = innerWidth * devicePixelRatio; canvas.height = innerHeight * devicePixelRatio; ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0); }
    addEventListener('resize', resize); resize();
    toggle.onclick = () => { running = !running; toggle.textContent = running ? 'Pause' : 'Play'; };
    function frame(ms) {
      requestAnimationFrame(frame); if (!running) return;
      const t = ms / 1000, w = innerWidth, h = innerHeight, e = +controls.energy.value, b = +controls.bass.value, s = +controls.sparkle.value;
      ctx.fillStyle = `hsl(${255 + Math.sin(t * .08) * 22} 42% ${5 + e * 7}%)`; ctx.fillRect(0, 0, w, h);
      const r = Math.min(w, h) * (.15 + b * .22 + Math.sin(t * 2.3) * e * .025), g = ctx.createRadialGradient(w / 2, h * .43, 0, w / 2, h * .43, r * 3);
      g.addColorStop(0, `hsla(${300 + s * 45} 95% 72% / ${.35 + e * .5})`); g.addColorStop(1, 'transparent'); ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = `hsla(${180 + s * 130} 100% 84% / ${.26 + s * .6})`; ctx.lineWidth = 1 + e * 3;
      for (let i = 0; i < 22 + s * 60; i++) { const a = i * 2.4 + t * (.4 + e), d = r + (i % 9) * 18; ctx.beginPath(); ctx.arc(w / 2 + Math.cos(a) * d, h * .43 + Math.sin(a * 1.3) * d, 1 + s * 2, 0, Math.PI * 2); ctx.stroke(); }
      ctx.fillStyle = `hsl(${280 + s * 70} 100% ${65 + e * 22}%)`; ctx.beginPath(); ctx.arc(w / 2, h * .43, r, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(frame);
  </script>
</body>
</html>
